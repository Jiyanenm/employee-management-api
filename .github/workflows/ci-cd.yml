name: Employee Management CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Java
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Cache Maven dependencies
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      # 4. Create Firebase credentials
      - name: Create Firebase key file
        run: |
          echo '${{ secrets.FIREBASE_CREDENTIALS }}' > $HOME/serviceAccount.json

      # 5. Set Firebase environment variable
      - name: Set Firebase environment variable
        run: |
          echo "FIREBASE_CREDENTIALS=$HOME/serviceAccount.json" >> $GITHUB_ENV

      # 6. Build project
      - name: Build with Maven
        run: mvn clean compile

      # 7. Run tests
      - name: Run Tests
        run: mvn test

      # 8. Generate Test Report
      - name: Generate Test Report
        run: mvn surefire-report:report